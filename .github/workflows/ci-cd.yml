name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-and-push:
    runs-on: windows-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set environment (dev vs prod)
      - name: Set environment variables
        id: vars
        shell: pwsh
        run: |
          if ("${env:GITHUB_REF}" -like "*main") {
            echo "ENV=prod" >> $env:GITHUB_OUTPUT
            echo "TAG=prod" >> $env:GITHUB_OUTPUT
          } else {
            echo "ENV=dev" >> $env:GITHUB_OUTPUT
            echo "TAG=dev" >> $env:GITHUB_OUTPUT
          }

      # 3. Login to GHCR
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      # 4. Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 5. Build & Push Image
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.TAG }}
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      # 6. Update GitOps Repo
      - name: Update GitOps repository
        shell: pwsh
        env:
          GIT_TOKEN: ${{ secrets.GITOPS_PAT }}
        run: |
          # Clean old clone if exists
          if (Test-Path "gitops") {
            Remove-Item -Recurse -Force "gitops"
          }

          # Clone GitOps repo
          git clone https://github.com/karris12/grade-api-gitops.git gitops
          Set-Location gitops

          # Select correct environment file
          if ("${{ steps.vars.outputs.ENV }}" -eq "prod") {
            $file = "environments/prod/deployment.yaml"
          } else {
            $file = "environments/dev/deployment.yaml"
          }

          # Read file
          $content = Get-Content $file -Raw

          # Replace image tag
          $newImage = "image: ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.TAG }}"
          $content = $content -replace "image: ghcr.io/.+?:.+", $newImage

          # Save updated file
          Set-Content $file $content

          # Commit & push
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git add $file
          git commit -m "Update ${{ steps.vars.outputs.ENV }} image to ${{ steps.vars.outputs.TAG }}"
          git push https://$($env:GIT_TOKEN)@github.com/karris12/grade-api-gitops.git main

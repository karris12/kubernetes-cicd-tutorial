name: CI/CD Pipeline
on:
  push:
    branches:
      - main
      - develop
jobs:
  build-and-push:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          driver: docker-container
          config-inline: |
            [dns]
              nameservers = ["8.8.8.8", "8.8.4.4"]

      - name: Set environment variables
        id: vars
        run: |
          if [[ "${GITHUB_REF##*/}" == "main" ]]; then
            echo "ENV=prod" >> $GITHUB_OUTPUT
            echo "TAG=prod" >> $GITHUB_OUTPUT
          else
            echo "ENV=dev" >> $GITHUB_OUTPUT
            echo "TAG=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.TAG }}
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Update GitOps repository
        run: |
          rm -rf gitops
          git clone https://github.com/karris12/grade-api-gitops.git gitops
          cd gitops

          name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-and-push:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set environment variables
        id: vars
        shell: pwsh
        run: |
          if ("${env:GITHUB_REF}" -like "*main") {
            echo "ENV=prod" >> $env:GITHUB_OUTPUT
            echo "TAG=prod" >> $env:GITHUB_OUTPUT
          } else {
            echo "ENV=dev" >> $env:GITHUB_OUTPUT
            echo "TAG=dev" >> $env:GITHUB_OUTPUT
          }

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.TAG }}
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Update GitOps repository
        shell: pwsh
        env:
          GIT_TOKEN: ${{ secrets.GITOPS_PAT }}
        run: |
          if (Test-Path "gitops") { Remove-Item -Recurse -Force "gitops" }

          git clone https://github.com/karris12/grade-api-gitops.git gitops
          Set-Location gitops

          if ("${{ steps.vars.outputs.ENV }}" -eq "prod") {
            $file = "environments/prod/deployment.yaml"
          } else {
            $file = "environments/dev/deployment.yaml"
          }

          $content = Get-Content $file -Raw

          $newImage = "image: ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.TAG }}"

          $content = $content -replace "image: ghcr.io/.+?:.+", $newImage

          Set-Content $file $content

          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git add $file
          git commit -m "Update ${{ steps.vars.outputs.ENV }} image to ${{ steps.vars.outputs.TAG }}"
          git push https://$($env:GIT_TOKEN)@github.com/karris12/grade-api-gitops.git main
